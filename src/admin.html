<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Anniversary Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body class="login-page">
  <div class="login" id="login-screen">
    <div class="login__card">
      <h1 class="login__title">Gallery Admin</h1>

      <div id="cloud-login" hidden>
        <p class="login__hint">Sign in to manage your gallery from anywhere</p>
        <button type="button" class="btn btn--google" id="google-signin">
          <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.56 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.16 7.09-10.27 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Sign in with Google
        </button>
        <p class="login__divider">or with email</p>
        <form id="email-login-form">
          <input type="email" id="login-email" class="input" placeholder="Email" autocomplete="email" required />
          <input type="password" id="login-email-password" class="input" placeholder="Password" autocomplete="current-password" required />
          <p class="login__error" id="login-error" hidden></p>
          <button type="submit" class="btn btn--primary">Sign In</button>
        </form>
      </div>

      <div id="local-login">
        <p class="login__hint">Enter password to manage photos (local dev)</p>
        <form id="login-form">
          <input type="password" id="login-password" class="input" placeholder="Password" autocomplete="current-password" required />
          <p class="login__error" id="local-login-error" hidden></p>
          <button type="submit" class="btn btn--primary">Enter Dashboard</button>
        </form>
        <p class="login__note">Local password: <code>love2025</code> · see <code>SUPABASE_SETUP.md</code> for cloud admin</p>
      </div>

      <p class="login__warning" id="js-warning" hidden>
        JavaScript didn't load. Run <code>npm run dev</code> and open
        <a href="http://localhost:5173/admin.html">http://localhost:5173/admin.html</a>
      </p>
      <a href="/" class="login__back">&larr; Back to gallery</a>
    </div>
  </div>

  <script>
    setTimeout(function () {
      if (!window.__adminLoaded) {
        var w = document.getElementById('js-warning');
        if (w) w.hidden = false;
      }
    }, 800);
  </script>
  <script type="module" src="/js/admin-login.js"></script>
</body>
</html>
