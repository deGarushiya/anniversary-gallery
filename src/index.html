<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Our Love Story</title>
  <meta name="description" content="Our journey to forever" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <!-- Watercolor botanical background -->
  <div class="watercolor-bg" aria-hidden="true">
    <div class="watercolor-bg__wash"></div>
    <img class="watercolor-bg__corner watercolor-bg__corner--tl" src="/decor/botanical-tl.svg" alt="" />
    <img class="watercolor-bg__corner watercolor-bg__corner--tr" src="/decor/botanical-tl.svg" alt="" />
    <img class="watercolor-bg__corner watercolor-bg__corner--bl" src="/decor/botanical-tl.svg" alt="" />
    <img class="watercolor-bg__corner watercolor-bg__corner--br" src="/decor/botanical-tl.svg" alt="" />
    <div class="watercolor-bg__petals"></div>
  </div>

  <!-- Vintage watercolor butterflies -->
  <div class="butterflies" aria-hidden="true">
    <img class="bfly bfly--1" src="/decor/butterfly-pink.svg" alt="" />
    <img class="bfly bfly--2" src="/decor/butterfly-orange.svg" alt="" />
    <img class="bfly bfly--3" src="/decor/butterfly-cream.svg" alt="" />
    <img class="bfly bfly--4" src="/decor/butterfly-lace.svg" alt="" />
    <img class="bfly bfly--5" src="/decor/butterfly-pink.svg" alt="" />
  </div>

  <!-- Portrait → landscape prompt (mobile) -->
  <div class="rotate-hint" id="rotate-hint" aria-live="polite">
    <div class="rotate-hint__card">
      <span class="rotate-hint__icon" aria-hidden="true">↻</span>
      <p class="rotate-hint__text">Please rotate your phone to landscape</p>
    </div>
  </div>

  <!-- Passcode gate -->
  <div class="gate" id="gate">
    <div class="gate__card torn-paper">
      <div class="gate__ornament" aria-hidden="true">♡</div>
      <h1 class="gate__title">For Your Eyes Only</h1>
      <p class="gate__hint">Enter the <strong>month</strong> and <strong>day</strong> of our anniversary</p>
      <p class="gate__subhint">Two digits for the month · two for the day</p>
      <form class="gate__form" id="gate-form" autocomplete="off">
        <div class="gate__pin" id="gate-pin">
          <input type="tel" inputmode="numeric" maxlength="1" class="gate__digit" data-idx="0" aria-label="Digit 1" />
          <input type="tel" inputmode="numeric" maxlength="1" class="gate__digit" data-idx="1" aria-label="Digit 2" />
          <span class="gate__dot" aria-hidden="true">·</span>
          <input type="tel" inputmode="numeric" maxlength="1" class="gate__digit" data-idx="2" aria-label="Digit 3" />
          <input type="tel" inputmode="numeric" maxlength="1" class="gate__digit" data-idx="3" aria-label="Digit 4" />
        </div>
        <button type="submit" class="btn btn--gold gate__submit">Unlock</button>
      </form>
    </div>
  </div>

  <!-- Welcome splash -->
  <div class="welcome" id="welcome" hidden>
    <p class="welcome__text">HI LOVEEEEYYYY, hehehe WELCOMEEEE</p>
  </div>

  <!-- Main site (sections added later) -->
  <main class="page" id="main-page" hidden>
    <!-- Sections will be added here one by one -->
  </main>

  <!-- Wrong passcode popup -->
  <div class="modal" id="denied-modal" hidden role="alertdialog" aria-labelledby="denied-title" aria-modal="true">
    <div class="modal__backdrop" data-close-modal></div>
    <div class="modal__card torn-paper">
      <p class="modal__title" id="denied-title">Hindi kita Jowa, Wala kang karapatan!</p>
      <button type="button" class="btn btn--gold modal__btn" data-close-modal>Okay na, sorry po</button>
    </div>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
