<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" aria-hidden="true">
  <defs>
    <filter id="wc-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" />
    </filter>
    <filter id="wc-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" />
    </filter>
    <linearGradient id="pink-wash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8c8d8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f5e6ea" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="sage-wash" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b5c4ae" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#dce5d8" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- Pink peony cluster -->
  <g filter="url(#wc-soft)" opacity="0.85">
    <ellipse cx="95" cy="110" rx="42" ry="38" fill="#f5b8cc"/>
    <ellipse cx="75" cy="95" rx="28" ry="26" fill="#f8c8d8"/>
    <ellipse cx="115" cy="95" rx="26" ry="24" fill="#f0aac4"/>
    <ellipse cx="90" cy="130" rx="30" ry="28" fill="#f8d0dc"/>
    <ellipse cx="110" cy="120" rx="22" ry="20" fill="#f5c6d6"/>
    <circle cx="92" cy="108" r="8" fill="#e8a0b8" opacity="0.5"/>
  </g>
  <!-- Second bloom -->
  <g filter="url(#wc-blur)" opacity="0.75">
    <ellipse cx="155" cy="55" rx="22" ry="20" fill="#f8c8d8"/>
    <ellipse cx="170" cy="65" rx="16" ry="15" fill="#f5b8cc"/>
    <ellipse cx="145" cy="68" rx="14" ry="13" fill="#fce0ea"/>
  </g>
  <!-- Sage leaves -->
  <g filter="url(#wc-blur)" opacity="0.7">
    <path d="M30 180 Q60 140 90 170 Q70 200 30 180" fill="url(#sage-wash)"/>
    <path d="M120 160 Q150 120 175 155 Q155 185 120 160" fill="#b5c4ae" opacity="0.6"/>
    <path d="M50 220 Q80 190 100 230 Q75 250 50 220" fill="#c5d4bf" opacity="0.5"/>
    <path d="M140 200 Q170 175 190 210 Q165 235 140 200" fill="#a8b5a0" opacity="0.55"/>
    <line x1="95" y1="110" x2="60" y2="200" stroke="#8a9a82" stroke-width="1.2" opacity="0.4"/>
    <line x1="95" y1="110" x2="150" y2="180" stroke="#8a9a82" stroke-width="1" opacity="0.35"/>
  </g>
  <!-- Gold dust -->
  <g opacity="0.55">
    <circle cx="130" cy="85" r="1.5" fill="#d4b896"/>
    <circle cx="68" cy="140" r="1" fill="#c9a86c"/>
    <circle cx="175" cy="130" r="1.2" fill="#d4b896"/>
    <circle cx="45" cy="165" r="0.8" fill="#e8c99a"/>
    <circle cx="160" cy="175" r="1" fill="#d4b896"/>
  </g>
  <!-- Gold wavy line -->
  <path d="M20 250 Q80 220 140 260 Q200 300 250 270" stroke="#d4b896" stroke-width="0.8" fill="none" opacity="0.35" stroke-dasharray="2 4"/>
</svg>
