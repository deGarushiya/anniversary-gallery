<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Gallery CMS — Anniversary Gallery</title>
  <link href="config.yml" type="text/yaml" rel="cms-config-url" />
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    .cms-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #666;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <p class="cms-loading" id="cms-loading">Loading gallery editor…</p>
  <script src="https://unpkg.com/decap-cms@^3.8.3/dist/decap-cms.js"></script>
  <script>
    document.getElementById('cms-loading')?.remove();
  </script>
</body>
